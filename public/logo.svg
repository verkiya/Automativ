<svg
  width="256"
  height="256"
  viewBox="0 0 256 256"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <!-- Automativ Brand Gradient -->
    <linearGradient id="automativGradient" x1="48" y1="208" x2="208" y2="48">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="30%" stop-color="#3b82f6" />
      <stop offset="65%" stop-color="#0891b2" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>

    <!-- Softer Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
    </filter>
  </defs>

  <!-- Ambient Glow -->
  <g opacity="0.08" filter="url(#glow)">
    <path
      d="M64 192L128 56L192 192"
      stroke="url(#automativGradient)"
      stroke-width="20"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- Left Leg -->
  <path
    d="M64 192L128 56"
    stroke="url(#automativGradient)"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- Right Leg -->
  <path
    d="M128 56L192 192"
    stroke="url(#automativGradient)"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- Crossbar -->
  <path
    d="M64 192L184 144"
    stroke="url(#automativGradient)"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- Internal Network -->
  <path
    d="M120 104L148 144"
    stroke="url(#automativGradient)"
    stroke-width="4"
    stroke-linecap="round"
  />

  <path
    d="M120 104L128 56"
    stroke="url(#automativGradient)"
    stroke-width="4"
    stroke-linecap="round"
  />

  <path
    d="M120 104L184 144"
    stroke="url(#automativGradient)"
    stroke-width="4"
    stroke-linecap="round"
  />

  <path
    d="M148 144L192 192"
    stroke="url(#automativGradient)"
    stroke-width="4"
    stroke-linecap="round"
  />

  <path
    d="M148 144L64 192"
    stroke="url(#automativGradient)"
    stroke-width="4"
    stroke-linecap="round"
  />

  <!-- Main Nodes -->
  <circle
    cx="64"
    cy="192"
    r="18"
    fill="url(#automativGradient)"
  />

  <circle
    cx="128"
    cy="56"
    r="14"
    fill="url(#automativGradient)"
  />

  <circle
    cx="192"
    cy="192"
    r="18"
    fill="url(#automativGradient)"
  />

  <!-- Internal Nodes -->
  <circle
    cx="120"
    cy="104"
    r="7"
    fill="url(#automativGradient)"
  />

  <circle
    cx="148"
    cy="144"
    r="10"
    fill="url(#automativGradient)"
  />

  <circle
    cx="184"
    cy="144"
    r="7"
    fill="url(#automativGradient)"
  />
</svg>
